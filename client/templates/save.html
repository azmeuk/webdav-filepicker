<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE — Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mu.amber.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='client.css') }}">
  </head>
  <body>
    <main class="container">
      <h1>SAVE</h1>
      <p><a href="{{ url_for('index') }}">&larr; Retour</a></p>

      <form id="save-form">
        <label>Fichiers locaux
          <input type="file" name="files" multiple>
        </label>

        <p>ou</p>

        <label>URL du fichier
          <input type="url" name="downloadUrl" placeholder="https://example.com/file.pdf">
        </label>
        <label>Nom du fichier (pour URL)
          <input type="text" name="downloadName" placeholder="file.pdf">
        </label>

        <fieldset>
          <legend>Mode d'ouverture</legend>
          <label><input type="radio" name="display" value="iframe" checked> Iframe</label>
          <label><input type="radio" name="display" value="popup"> Popup</label>
        </fieldset>

        <button type="submit" class="btn btn-primary">Choisir la destination</button>
      </form>

      <div id="result"></div>

      <div id="picker-overlay">
        <iframe id="picker-iframe"></iframe>
      </div>
    </main>

    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script src="{{ url_for('static', filename='picker-bridge.js') }}"></script>
    <script>
      const bridge = new PickerBridge("{{ picker_url }}");

      function readFileAsBase64(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.readAsDataURL(file);
        });
      }

      document.getElementById("save-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;

        bridge.display = form.querySelector('[name="display"]:checked').value;

        const files = Array.from(form.querySelector('[name="files"]').files);
        const url = form.querySelector('[name="downloadUrl"]').value.trim();
        const name = form.querySelector('[name="downloadName"]').value.trim();

        const params = new URLSearchParams();

        if (files.length > 0) {
          bridge.pendingFiles = await Promise.all(files.map(async (f) => ({
            name: f.name,
            mimeType: f.type,
            size: f.size,
            payload: await readFileAsBase64(f),
          })));
        } else if (url) {
          bridge.pendingFiles = [{
            name: name || url.split("/").pop() || "file",
            downloadUrl: url,
          }];
        } else {
          console.debug("[save] no files selected and no URL provided");
          return;
        }

        bridge.open(params);
      });
    </script>
  </body>
</html>
