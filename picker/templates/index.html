{% from "icons.html" import icon %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDAV File Picker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mu.azure.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='htmx.min.js') }}"></script>
  </head>
  <body>
    {% if intent.client_url %}
      <button id="btn-cancel" class="close-btn" title="Fermer">{{ icon("x", 24) }}</button>
    {% endif %}

    {% for message in get_flashed_messages() %}
      <div class="toast toast-top-right">
        <div class="alert alert-success alert-dismissible" role="alert">
          <p>{{ message }}</p>
          <button class="alert-close" aria-label="Close" onclick="this.closest('.toast').remove()">&times;</button>
        </div>
      </div>
    {% endfor %}

    <main class="container">
      <h1>WebDAV File Picker</h1>

      {% include "partials/file_list.html" %}
    </main>

    <script>
      const ACTION = {{ intent.action | tojson }};
      const MULTIPLE = {{ intent.multiple | tojson }};
      const CLIENT_URL = {{ intent.client_url | tojson }};
      const INTENT_ID = {{ intent.intent_id | tojson }};
      const INTENT_TYPE = {{ intent.type | tojson }};
      const DOWNLOAD_URL = {{ intent.download_url | tojson }};
      const WEBDAV_BASE = {{ webdav_public_url | tojson }};
    </script>
    <script src="{{ url_for('static', filename='picker.js') }}"></script>
  </body>
</html>
